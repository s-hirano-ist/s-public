name: vrt
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  screenshots:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Wait for Cloudflare Pages deployment
        id: cf-deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          for i in $(seq 1 60); do
            RESULT=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/s-public/deployments")
            URL=$(echo "$RESULT" | jq -r \
              ".result[] | select(.deployment_trigger.metadata.commit_hash == \"$COMMIT_SHA\") | select(.latest_stage.status == \"success\") | .url" \
              | head -1)
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Deployment ready: $URL"
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Waiting for deployment... (attempt $i/60)"
            sleep 15
          done
          echo "::error::Cloudflare Pages deployment not found after 15 minutes"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install tools via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm i --frozen-lockfile
      - run: pnpm exec playwright install
      - run: pnpm snapshots:update
        env:
          BASE_URL: https://s-hirano.com/
      - run: pnpm snapshots
        env:
          BASE_URL: ${{ steps.cf-deployment.outputs.url }}
      - name: Upload failed screenshots
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vrt-failed-screenshots-${{ github.sha }}
          path: test-results
