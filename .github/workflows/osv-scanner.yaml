name: osv-scanner
on:
  push:
    branches: [main]
    paths:
      - pnpm-lock.yaml
      - package.json
      - mise.toml
  schedule:
    - cron: "0 23 * * 1"
  workflow_dispatch:
jobs:
  scan:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=./pnpm-lock.yaml
        --recursive
        ./
