name: osv-scanner
on:
  push:
    branches: [main]
    paths:
      - pnpm-lock.yaml
      - package.json
      - mise.toml
  schedule:
    - cron: "0 23 * * 1"
  workflow_dispatch:
jobs:
  scan:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      scan-args: |-
        --lockfile=./pnpm-lock.yaml
        --recursive
        ./
