name: dependency-review
on:
  pull_request:
    branches: [main]
jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 20
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          deny-licenses: >-
            GPL-1.0-only,
            GPL-1.0-or-later,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            LGPL-2.0-only,
            LGPL-2.0-or-later,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0-only,
            LGPL-3.0-or-later,
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            GPL-2.0,
            GPL-3.0,
            LGPL-2.0,
            LGPL-2.1,
            LGPL-3.0,
            AGPL-1.0,
            AGPL-3.0

          # sharp uses prebuilt libvips packages. Keep LGPL blocked by default,
          # but allow these reviewed sharp/libvips runtime artifacts only.
          allow-dependencies-licenses: >-
            pkg:npm/@img/sharp-libvips-darwin-arm64,
            pkg:npm/@img/sharp-libvips-darwin-x64,
            pkg:npm/@img/sharp-libvips-linux-arm,
            pkg:npm/@img/sharp-libvips-linux-arm64,
            pkg:npm/@img/sharp-libvips-linux-ppc64,
            pkg:npm/@img/sharp-libvips-linux-riscv64,
            pkg:npm/@img/sharp-libvips-linux-s390x,
            pkg:npm/@img/sharp-libvips-linux-x64,
            pkg:npm/@img/sharp-libvips-linuxmusl-arm64,
            pkg:npm/@img/sharp-libvips-linuxmusl-x64
